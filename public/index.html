<!DOCTYPE html>
<html>
<head>
<title>Ryuk Running Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

.btn {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  padding:12px 25px;
  font-size:18px;
  background:#00ff88;
  border:none;
  border-radius:8px;
}

.hud {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:10px 15px;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="hud">
  <div id="scoreText">Score: 0</div>
  <div id="livesText">Lives: 3</div>
  <div id="highText">High: 0</div>
</div>

<button id="startBtn" class="btn" style="top:60%;">START</button>
<button id="homeBtn" class="btn" style="top:65%; display:none;">HOME</button>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// ===== USER ID =====
let userId = localStorage.getItem("userId");
if(!userId){
  userId = "user_" + Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

// ===== ASSETS =====
const dino = new Image(); dino.src="dino.gif";
const coin = new Image(); coin.src="coin.png";
const cactus = new Image(); cactus.src="cactus.png";
const bg = new Image(); bg.src="background.png";

const collectSound = new Audio("collect.wav");
const gameOverSound = new Audio("game_over.wav");
const bgMusic = new Audio("background_music.wav");
bgMusic.loop = true;

// ===== STATES =====
const HOME=0, PLAYING=1, GAME_OVER=2;
let gameState = HOME;

// ===== VARIABLES =====
let dinoX=120, dinoY;
let dinoW=60, dinoH=70;
let ground;

let velocity=0, gravity=0.45;

let score=0, lives=3, highScore=0;

let jump=false;
let coins=[], cacti=[];
let speed=3, bgX=0;
let gameOverPlayed=false;

// ===== UI =====
const scoreText = document.getElementById("scoreText");
const livesText = document.getElementById("livesText");
const highText = document.getElementById("highText");

// ===== BUTTONS =====
const startBtn=document.getElementById("startBtn");
const homeBtn=document.getElementById("homeBtn");

// ===== START =====
startBtn.onclick = async () => {
  init();
  gameState = PLAYING;
  startBtn.style.display = "none";

  bgMusic.currentTime = 0;
  bgMusic.play();

  await loadHighScore();
};

// ===== HOME =====
homeBtn.onclick = async () => {
  gameState = HOME;
  homeBtn.style.display = "none";
  startBtn.style.display = "block";

  bgMusic.pause();
  gameOverSound.pause();

  await loadHighScore();
};

// ===== INIT =====
function init(){
  ground = canvas.height - dinoH;
  dinoY = ground;

  velocity=0;
  score=0;
  lives=3;

  coins=[];
  cacti=[];

  speed=3;
  gameOverPlayed=false;

  gameOverSound.pause();
  gameOverSound.currentTime = 0;
}

// ===== INPUT =====
document.addEventListener("keydown", e=>{
  if(e.code==="Space" && gameState===PLAYING && dinoY>=ground){
    jump=true;
  }
});

canvas.addEventListener("touchstart", ()=>{
  if(gameState===PLAYING && dinoY>=ground){
    jump=true;
  }
});

// ===== COLLISION =====
function isColliding(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ===== GAME OVER HANDLER (FIXED) =====
async function handleGameOver(){
  try{
    let res = await fetch("/api/score",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({score,userId})
    });

    let data = await res.json();

    // ✅ UPDATE IMMEDIATELY
    highScore = data.score;
    highText.innerText = "High: " + highScore;

  }catch(e){
    console.log("Save error", e);
  }
}

// ===== UPDATE =====
function update(){
  if(gameState!==PLAYING) return;

  bgX -= speed;
  if(bgX <= -canvas.width) bgX=0;

  if(jump){
    velocity=-11;
    jump=false;
  }

  dinoY += velocity;
  velocity += gravity;
  if(velocity>8) velocity=8;

  if(dinoY>ground){ dinoY=ground; velocity=0; }

  // coins
  if(Math.random()<0.02){
    coins.push({x:canvas.width,y:ground});
  }

  for(let i=coins.length-1;i>=0;i--){
    let c=coins[i];
    c.x-=speed;

    let dinoBox={x:dinoX+10,y:dinoY+10,w:dinoW-20,h:dinoH-15};
    let coinBox={x:c.x+8,y:c.y+8,w:25,h:25};

    if(isColliding(dinoBox,coinBox)){
      score++;
      collectSound.currentTime=0;
      collectSound.play();
      coins.splice(i,1);
    }
  }

  // cactus
  if(cacti.length===0 || (canvas.width-cacti[cacti.length-1].x)>550){
    if(Math.random()<0.012){
      cacti.push({x:canvas.width,y:ground});
    }
  }

  for(let i=cacti.length-1;i>=0;i--){
    let c=cacti[i];
    c.x-=speed;

    let dinoBox={x:dinoX+10,y:dinoY+10,w:dinoW-20,h:dinoH-15};
    let cactusBox={x:c.x+5,y:c.y+10,w:40,h:40};

    if(isColliding(dinoBox,cactusBox)){
      lives--;
      cacti.splice(i,1);

      if(lives<=0){
        gameState=GAME_OVER;

        bgMusic.pause();

        handleGameOver(); // ✅ FIXED

        if(!gameOverPlayed){
          gameOverSound.play();
          gameOverPlayed=true;
        }

        homeBtn.style.display="block";
      }
    }
  }

  speed+=0.0008;

  scoreText.innerText="Score: "+score;
  livesText.innerText="Lives: "+lives;
}

// ===== DRAW =====
function draw(){
  ctx.drawImage(bg,bgX,0,canvas.width,canvas.height);
  ctx.drawImage(bg,bgX+canvas.width,0,canvas.width,canvas.height);

  if(gameState===HOME){
    ctx.fillStyle="white";
    ctx.textAlign="center";
    ctx.font="40px Arial";
    ctx.fillText("RYUK RUNNING GAME",canvas.width/2,200);

    ctx.font="25px Arial";
    ctx.fillText("High Score: "+highScore,canvas.width/2,260);
    return;
  }

  ctx.drawImage(dino,dinoX,dinoY,dinoW,dinoH);
  coins.forEach(c=>ctx.drawImage(coin,c.x,c.y,40,40));
  cacti.forEach(c=>ctx.drawImage(cactus,c.x,c.y,50,50));
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// ===== LOAD HIGH SCORE =====
async function loadHighScore(){
  try{
    let res = await fetch("/api/score?userId="+userId);
    let data = await res.json();
    highScore = data.score || 0;
    highText.innerText="High: "+highScore;
  }catch(e){
    console.log("Load error", e);
  }
}

// ===== INIT =====
loadHighScore();
init();
loop();
</script>

</body>
</html>
