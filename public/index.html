<!DOCTYPE html>
<html>
<head>
<title>Ryuk Running Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#menu {
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
}
button {
  padding:10px 20px;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="menu">
  <h1>Ryuk Running Game</h1>
  <p id="highscore">Loading...</p>
  <button onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dino, cacti, score, lives, gameOver;

function init(){
  dino = {x:100,y:500,w:50,h:60,vy:0};
  cacti = [];
  score = 0;
  lives = 3;
  gameOver = false;
}

function startGame(){
  document.getElementById("menu").style.display="none";
  init();
}

document.addEventListener("keydown", e=>{
  if(e.code==="Space" && dino.y===500){
    dino.vy = -18;
  }
});

function update(){
  if(gameOver) return;

  dino.y += dino.vy;
  dino.vy += 1;

  if(dino.y > 500){
    dino.y = 500;
    dino.vy = 0;
  }

  if(Math.random() < 0.02){
    cacti.push({x:canvas.width,y:500,w:40,h:40});
  }

  cacti.forEach((c,i)=>{
    c.x -= 6;

    if(
      c.x < dino.x + dino.w &&
      c.x + c.w > dino.x &&
      c.y < dino.y + dino.h
    ){
      lives--;
      cacti.splice(i,1);
      if(lives<=0){
        gameOver=true;
        saveScore(score);
        showMenu();
      }
    }
  });

  score++;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.fillRect(dino.x,dino.y,dino.w,dino.h);

  ctx.fillStyle="green";
  cacti.forEach(c=>ctx.fillRect(c.x,c.y,c.w,c.h));

  ctx.fillText("Score:"+score,20,30);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// 🔥 API CALLS
async function saveScore(score){
  await fetch("/api/score",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({score})
  });
}

async function loadHighScore(){
  let res = await fetch("/api/score");
  let data = await res.json();
  document.getElementById("highscore").innerText =
    "High Score: " + (data.score || 0);
}

function showMenu(){
  document.getElementById("menu").style.display="block";
  loadHighScore();
}

loadHighScore();
</script>

</body>
</html>
