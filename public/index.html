<!DOCTYPE html>
<html>
<head>
<title>Ryuk Running Game</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

.btn {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  padding:15px 30px;
  font-size:22px;
  background:#00ff88;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<button id="startBtn" class="btn" style="top:60%;">START GAME</button>
<button id="homeBtn" class="btn" style="top:65%; display:none;">HOME</button>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== ASSETS =====
const dino = new Image(); dino.src="dino.gif";
const coin = new Image(); coin.src="coin.png";
const cactus = new Image(); cactus.src="cactus.png";
const bg = new Image(); bg.src="background.png";

// 🔊 SOUNDS
const collectSound = new Audio("collect.wav");
const gameOverSound = new Audio("game_over.wav");
const bgMusic = new Audio("background_music.wav");

bgMusic.loop = true;

// ===== STATES =====
const HOME = 0, PLAYING = 1, GAME_OVER = 2;
let gameState = HOME;

// ===== VARIABLES =====
let dinoX = 120, dinoY;
let dinoW = 65, dinoH = 75;
let ground;

let velocity = 0;
let gravity = 0.45;

let score = 0;
let lives = 3;
let highScore = localStorage.getItem("highscore") || 0;

let jump = false;

let coins = [];
let cacti = [];

let speed = 3;
let bgX = 0;

let gameOverPlayed = false;

// ===== BUTTONS =====
const startBtn = document.getElementById("startBtn");
const homeBtn = document.getElementById("homeBtn");

startBtn.onclick = () => {
  init();
  gameState = PLAYING;
  startBtn.style.display = "none";

  // ▶️ START MUSIC
  bgMusic.currentTime = 0;
  bgMusic.play();
};

homeBtn.onclick = () => {
  gameState = HOME;
  homeBtn.style.display = "none";
  startBtn.style.display = "block";

  // ⛔ STOP ALL SOUND
  bgMusic.pause();
  gameOverSound.pause();
  gameOverSound.currentTime = 0;
};

// ===== INIT =====
function init(){
  ground = canvas.height - dinoH;
  dinoY = ground;

  velocity = 0;
  score = 0;
  lives = 3;

  coins = [];
  cacti = [];

  speed = 3;
  gameOverPlayed = false;

  // reset sounds
  gameOverSound.pause();
  gameOverSound.currentTime = 0;
}

// ===== INPUT =====
document.addEventListener("keydown", e=>{
  if(e.code==="Space" && gameState===PLAYING && dinoY>=ground){
    jump = true;
  }
});

// ===== COLLISION =====
function isColliding(a, b){
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

// ===== UPDATE =====
function update(){

  if(gameState !== PLAYING) return;

  // background
  bgX -= speed;
  if(bgX <= -canvas.width) bgX = 0;

  // jump
  if(jump){
    velocity = -11;
    jump = false;
  }

  dinoY += velocity;
  velocity += gravity;

  if(velocity > 8) velocity = 8;

  if(dinoY > ground){
    dinoY = ground;
    velocity = 0;
  }

  // ===== COINS (FIXED COLLISION) =====
  if(Math.random() < 0.018){
    coins.push({x:canvas.width,y:ground});
  }

  for(let i=coins.length-1;i>=0;i--){
    let c = coins[i];
    c.x -= speed;

    let dinoBox = {
      x: dinoX + 10,
      y: dinoY + 10,
      w: dinoW - 20,
      h: dinoH - 15
    };

    let coinBox = {
      x: c.x + 8,
      y: c.y + 8,
      w: 25,
      h: 25
    };

    if(isColliding(dinoBox, coinBox)){
      score++;
      collectSound.currentTime=0;
      collectSound.play();
      coins.splice(i,1);
    } else if(c.x < -50){
      coins.splice(i,1);
    }
  }

  // ===== CACTUS =====
  if(cacti.length===0 ||
     (canvas.width - cacti[cacti.length-1].x) > 550){

    if(Math.random() < 0.012){
      cacti.push({x:canvas.width,y:ground});
    }
  }

  for(let i=cacti.length-1;i>=0;i--){
    let c = cacti[i];
    c.x -= speed;

    let dinoBox = {
      x: dinoX + 10,
      y: dinoY + 10,
      w: dinoW - 20,
      h: dinoH - 15
    };

    let cactusBox = {
      x: c.x + 5,
      y: c.y + 10,
      w: 40,
      h: 40
    };

    if(isColliding(dinoBox, cactusBox)){
      lives--;
      cacti.splice(i,1);

      if(lives <= 0){
        gameState = GAME_OVER;

        // ⛔ STOP BG MUSIC
        bgMusic.pause();

        if(score > highScore){
          highScore = score;
          localStorage.setItem("highscore", highScore);
        }

        if(!gameOverPlayed){
          gameOverSound.play();
          gameOverPlayed = true;
        }

        homeBtn.style.display = "block";
      }
    } else if(c.x < -50){
      cacti.splice(i,1);
    }
  }

  speed += 0.0008;
}

// ===== DRAW =====
function draw(){

  ctx.drawImage(bg,bgX,0,canvas.width,canvas.height);
  ctx.drawImage(bg,bgX+canvas.width,0,canvas.width,canvas.height);

  if(gameState === HOME){
    ctx.fillStyle="white";
    ctx.textAlign="center";
    ctx.font="50px Arial";
    ctx.fillText("RYUK RUNNING GAME", canvas.width/2, 200);

    ctx.font="28px Arial";
    ctx.fillText("High Score: " + highScore, canvas.width/2, 260);
    return;
  }

  ctx.drawImage(dino,dinoX,dinoY,dinoW,dinoH);

  coins.forEach(c=>ctx.drawImage(coin,c.x,c.y,40,40));
  cacti.forEach(c=>ctx.drawImage(cactus,c.x,c.y,50,50));

  ctx.fillStyle="rgba(0,0,0,0.5)";
  ctx.fillRect(10,10,180,70);

  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.fillText("Score: "+score,20,35);
  ctx.fillText("Lives: "+lives,20,60);

  if(gameState === GAME_OVER){
    ctx.textAlign="center";
    ctx.fillStyle="red";
    ctx.font="50px Arial";
    ctx.fillText("GAME OVER", canvas.width/2, 200);

    ctx.fillStyle="white";
    ctx.font="28px Arial";
    ctx.fillText("Score: "+score, canvas.width/2, 260);
    ctx.fillText("High Score: "+highScore, canvas.width/2, 300);
  }
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
</script>

</body>
</html>
